name: Verilog Simulation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Icarus Verilog
      run: |
        sudo apt-get update
        sudo apt-get install -y iverilog

    - name: Compile design
      run: |
        iverilog -g2012 \
          -o sim.out \
          adder.v \
          adder_tb.sv

    - name: Run simulation
      run: |
        vvp sim.out
